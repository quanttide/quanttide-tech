# 量潮科技工作手册系统 — 文档工程契约
# 模块定位：MyST Markdown 语法规范、Jupyter Book 构建配置

# ── 文档规范 ──────────────────────────────────────────

standards:
  format:
    syntax: myst
    markdown_flavor: gfm
    
  headings:
    max_level: 3
    document_title: h1
    section: h2
    subsection: h3
    
  code_blocks:
    language_required: true
    fence_style: fenced
    
  lists:
    unordered: "-"
    ordered: "1."
    
  links:
    reference: "[text](url)"
    inline: "[text](url)"

# ── MyST 语法 ──────────────────────────────────────────

myst_syntax:
  admonitions:
    - note
    - warning
    - danger
    - tip
    - important
    
  toc:
    enabled: true
    depth: 2
    
  cross_references: true
  internal_links: true
  
  execution:
    enabled: false
    cache: false

# ── Jupyter Book ──────────────────────────────────────

jupyter_book:
  config_file: _config.yml
  toc_file: _toc.yml
  
  build:
    command: jupyter-book build index.md --site
    output_dir: _build/html
    
  clean:
    command: jupyter-book clean .

# ── 文件命名规范 ──────────────────────────────────────

naming:
  filename:
    case: lowercase
    separator: "-"
    example: my-document-name.md
    
  directory:
    case: lowercase
    separator: "-"
    plural: true
    example: my-directory/
