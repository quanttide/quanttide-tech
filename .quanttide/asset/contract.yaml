# 量潮科技工作手册系统 — 数字资产契约
# 模块定位：多仓架构管理数字资产
# 分类依据：程序型记忆九宫格模型
# 参考：docs/profile/asset/memory_model.md

# ── 资产组成 ──────────────────────────────────────────

# 按程序型记忆九宫格组织
# 约束力层次：宪法 > 法律 > 法理
# 消费对象：人类友好 > AI友好 > 规则引擎友好

assets:
  # ── 宪法层：最高约束力 ──
  
  # 宪法 - 人类友好：Bylaw
  bylaw:
    title: 章程
    type: docs
    category: constitution
    audience: human
    path: docs/bylaw
    description: 量潮科技企业章程，最高约束力

  # 宪法 - AI友好：Specification
  specification:
    title: 工程标准
    type: docs
    category: constitution
    audience: ai
    path: docs/specification
    description: 量潮科技工程标准规范

  # 宪法 - 规则引擎友好：Toolkit
  toolkit:
    title: 工具箱
    type: config
    category: constitution
    audience: engine
    path: .agents/skills
    description: AI Agent 可复用技能

  # ── 法律层：中等约束力 ──

  # 法律 - 人类友好：Handbook
  handbook:
    title: 工作手册
    type: docs
    category: law
    audience: human
    path: docs/handbook
    description: 量潮科技工作手册系统

  # 法律 - AI友好：Gallery
  gallery:
    title: 案例画廊
    type: docs
    category: law
    audience: ai
    path: docs/gallery
    description: 企业实体案例展示框架

  # 法律 - 规则引擎友好：Platform
  platform:
    title: 平台
    type: app
    category: law
    audience: engine
    path: apps
    description: 量潮科技应用平台

  # ── 法理层：低约束力 ──

  # 法理 - 人类友好：Tutorial
  tutorial:
    title: 手册
    type: docs
    category: principle
    audience: human
    path: docs/tutorial
    description: 量潮科技操作手册

  # 法理 - AI友好：Essay
  essay:
    title: 随笔
    type: docs
    category: principle
    audience: ai
    path: docs/essay
    description: 量潮科技随笔集

  # 法理 - 规则引擎友好：Example
  example:
    title: 示例
    type: app
    category: principle
    audience: engine
    path: apps/qtcloud-asset/examples
    description: 示例与原型验证
