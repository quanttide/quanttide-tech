# 量潮科技工作手册系统 — 数字资产契约
# 模块定位：多仓架构管理数字资产
# 分类依据：程序型记忆九宫格模型 + 陈述型记忆九宫格模型
# 参考：docs/profile/asset/memory_model.md

# ── 资产组成 ──────────────────────────────────────────

# 按记忆模型组织，与 .gitmodules 对齐

assets:
  # ── 程序型记忆 ──

  # 宪法层：最高约束力
  bylaw:
    title: 章程
    type: docs
    category: constitution
    audience: human
    path: docs/bylaw
    submodule: docs/bylaw
    description: 量潮科技企业章程，最高约束力

  specification:
    title: 工程标准
    type: docs
    category: constitution
    audience: ai
    path: docs/specification
    submodule: docs/specification
    description: 量潮科技工程标准规范

  # 法律层：中等约束力
  handbook:
    title: 工作手册
    type: docs
    category: law
    audience: human
    path: docs/handbook
    submodule: docs/handbook
    description: 量潮科技工作手册系统

  gallery:
    title: 案例画廊
    type: docs
    category: law
    audience: ai
    path: docs/gallery
    submodule: docs/gallery
    description: 企业实体案例展示框架

  qtadmin:
    title: qtadmin
    type: app
    category: law
    audience: engine
    path: apps/qtadmin
    submodule: apps/qtadmin
    description: Django 管理后台

  qtcloud_data:
    title: qtcloud-data
    type: app
    category: law
    audience: engine
    path: apps/qtcloud-data
    submodule: apps/qtcloud-data
    description: 量潮云数据应用

  qtcloud_asset:
    title: qtcloud-asset
    type: app
    category: law
    audience: engine
    path: apps/qtcloud-asset
    submodule: apps/qtcloud-asset
    description: 数字资产管理基础设施

  # 法理层：低约束力
  tutorial:
    title: 手册
    type: docs
    category: principle
    audience: human
    path: docs/tutorial
    submodule: docs/tutorial
    description: 量潮科技操作手册

  essay:
    title: 随笔
    type: docs
    category: principle
    audience: ai
    path: docs/essay
    submodule: docs/essay
    description: 量潮科技随笔集

  # ── 陈述型记忆 ──

  # 过去
  archive:
    title: 档案
    type: docs
    category: declarative
    type_dim: event
    time_dim: past
    path: docs/archive
    submodule: docs/archive
    description: 量潮科技历史文档归档

  report:
    title: 报告
    type: docs
    category: declarative
    type_dim: semantic
    time_dim: past
    path: docs/report
    submodule: docs/report
    description: 量潮科技工作报告

  story:
    title: 故事
    type: docs
    category: declarative
    type_dim: self
    time_dim: past
    path: docs/story
    submodule: docs/story
    description: 量潮科技品牌故事

  # 现在
  journal:
    title: 期刊
    type: docs
    category: declarative
    type_dim: event
    time_dim: present
    path: docs/journal
    submodule: docs/journal
    description: 量潮科技期刊，团队知识沉淀

  profile:
    title: 配置
    type: docs
    category: declarative
    type_dim: semantic
    time_dim: present
    path: docs/profile
    submodule: docs/profile
    description: 量潮科技配置模板

  # 未来
  roadmap:
    title: 蓝图
    type: docs
    category: declarative
    type_dim: event
    time_dim: future
    path: docs/roadmap
    submodule: docs/roadmap
    description: 量潮科技产品蓝图

  vision:
    title: 愿景
    type: docs
    category: declarative
    type_dim: self
    time_dim: future
    path: docs/vision
    submodule: docs/vision
    description: 量潮科技愿景与使命

  # ── 本地资源（非子模块） ──
  skills:
    title: 技能
    type: config
    category: skill
    path: .agents/skills
    description: AI Agent 可复用技能
